<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mowbot MapLibre Map</title>

    <!-- Load MapLibre GL JS & CSS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #121212; }
        #map { height: 100%; width: 100%; }

        /* Optional: Hide the MapLibre watermark to keep the UI purely industrial */
        .maplibregl-ctrl-bottom-right { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Your exact style specification
        const SATELLITE_STYLE = {
            version: 8,
            glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
            sources: {
                'esri-satellite': {
                    type: 'raster',
                    tiles: [
                        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                    ],
                    tileSize: 256,
                    attribution: '&copy; <a href="https://www.esri.com/">Esri</a>'
                }
            },
            layers: [
                {
                    id: 'esri-satellite-layer',
                    type: 'raster',
                    source: 'esri-satellite'
                }
            ]
        };

        // Initialize the map
        const map = new maplibregl.Map({
            container: 'map', // ID of the div
            style: SATELLITE_STYLE,
            center: [128.34, 36.11], // Centered on Gumi, South Korea
            zoom: 17, // High zoom for mowing operations
            interactive: false // Optional: Set to false if you want to lock the map so the operator can't pan around, forcing it to follow the robot
        });

        // Once the map loads, we can easily add the robot marker later
        map.on('load', () => {
            console.log("MapLibre loaded ESRI Satellite tiles successfully!");
        });
    </script>
</body>
</html>
