<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mowbot Leaflet Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #121212; }
        #map { height: 100%; width: 100%; background-color: #121212; }
        .leaflet-control-zoom { display: none !important; }
        #cardinal-overlay {
            position: absolute;
            left: 12px;
            bottom: 12px;
            width: 74px;
            height: 74px;
            pointer-events: none;
            z-index: 1000;
            font-family: Arial, sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.85);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(10, 14, 18, 0.42);
            backdrop-filter: blur(1px);
        }
        #cardinal-overlay span {
            position: absolute;
            opacity: 0.95;
        }
        #cardinal-overlay::before,
        #cardinal-overlay::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.26);
        }
        #cardinal-overlay::before {
            left: 50%;
            top: 9px;
            bottom: 9px;
            width: 1px;
            transform: translateX(-50%);
        }
        #cardinal-overlay::after {
            top: 50%;
            left: 9px;
            right: 9px;
            height: 1px;
            transform: translateY(-50%);
        }
        #cardinal-overlay .north { top: 5px; left: 50%; transform: translateX(-50%); }
        #cardinal-overlay .south { bottom: 5px; left: 50%; transform: translateX(-50%); }
        #cardinal-overlay .east { right: 6px; top: 50%; transform: translateY(-50%); }
        #cardinal-overlay .west { left: 6px; top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="cardinal-overlay" aria-hidden="true">
        <span class="north">N</span>
        <span class="east">E</span>
        <span class="south">S</span>
        <span class="west">W</span>
    </div>
    <script>
        const TRACK_ZOOM = 19;
        const MAX_CLIENT_ZOOM = 22;
        let userZoomOverride = false;
        // ROS2 ENU yaw (0=E, +CCW) -> screen/CSS rotation.
        const MOWBOT_ARROW_SVG =
            '<svg width="30" height="30" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 L90 90 L50 70 L10 90 L50 5 Z" fill="#00ff88" stroke="#ffffff" stroke-width="2"/></svg>';

        var map = L.map('map', {
            zoomControl: true,
            dragging: true,
            scrollWheelZoom: true,
            touchZoom: true,
            doubleClickZoom: true,
            boxZoom: true,
            keyboard: true,
            maxZoom: MAX_CLIENT_ZOOM
        }).setView([36.11, 128.34], 17);
        map.on('zoomstart', function () {
            userZoomOverride = true;
        });

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; <a href="https://www.esri.com/">Esri</a>',
            maxNativeZoom: 19,
            maxZoom: MAX_CLIENT_ZOOM
        }).addTo(map);

        console.log("Leaflet loaded ESRI Satellite tiles successfully (WebGL bypassed)!");

        var robotMarker = null;
        function updateRobotPosition(lat, lng, headingRad) {
            const markerHeading = (Math.PI / 2) - (headingRad || 0);
            if (!robotMarker) {
                const icon = L.divIcon({
                    className: 'mowbot-arrow-icon',
                    html: `<div id="mowbot-arrow" style="width:30px;height:30px;transform: rotate(${markerHeading}rad);transform-origin: 50% 50%;">${MOWBOT_ARROW_SVG}</div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15],
                });
                robotMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
            } else {
                robotMarker.setLatLng([lat, lng]);
                const arrow = document.getElementById('mowbot-arrow');
                if (arrow) {
                    arrow.style.transform = `rotate(${markerHeading}rad)`;
                }
            }
            if (!userZoomOverride) {
                map.setView([lat, lng], TRACK_ZOOM, { animate: false });
            } else {
                map.panTo([lat, lng], { animate: false });
            }
        }

        // ── Teach-in overlay (PATH: polyline only; POLY: filled polygon when ≥3 points) ─
        var teachGroup = L.layerGroup().addTo(map);
        var teachMarkers = [];
        var teachPolyline = null;
        var teachPolygon = null;
        var teachIsPoly = false;

        function setTeachRecordingMode(isPoly) {
            teachIsPoly = !!isPoly;
            _rebuildTeachGeometry();
        }

        function _rebuildTeachGeometry() {
            if (teachPolyline) {
                teachGroup.removeLayer(teachPolyline);
                teachPolyline = null;
            }
            if (teachPolygon) {
                teachGroup.removeLayer(teachPolygon);
                teachPolygon = null;
            }
            const ll = teachMarkers.map(function (m) { return m.getLatLng(); });
            if (ll.length < 2) return;
            if (teachIsPoly && ll.length >= 3) {
                teachPolygon = L.polygon(ll, {
                    color: '#00E676',
                    weight: 3,
                    fillColor: '#00E676',
                    fillOpacity: 0.28
                }).addTo(teachGroup);
            } else {
                teachPolyline = L.polyline(ll, {
                    color: '#00E676',
                    weight: 3,
                    opacity: 0.95
                }).addTo(teachGroup);
            }
        }

        function addTeachPoint(lat, lng) {
            const m = L.circleMarker([lat, lng], {
                radius: 4,
                color: '#00B0FF',
                weight: 1,
                fillColor: '#00B0FF',
                fillOpacity: 0.9
            }).addTo(teachGroup);
            teachMarkers.push(m);
            _rebuildTeachGeometry();
        }

        function undoTeachPoint() {
            if (teachMarkers.length === 0) return;
            const m = teachMarkers.pop();
            teachGroup.removeLayer(m);
            _rebuildTeachGeometry();
        }

        function clearTeachLayer() {
            teachMarkers.forEach(function (m) { teachGroup.removeLayer(m); });
            teachMarkers = [];
            if (teachPolyline) {
                teachGroup.removeLayer(teachPolyline);
                teachPolyline = null;
            }
            if (teachPolygon) {
                teachGroup.removeLayer(teachPolygon);
                teachPolygon = null;
            }
        }

        function closePolygon() {
            _rebuildTeachGeometry();
        }

        // ── RUN: loaded mission preview (distinct from teach-in) ─────────
        var missionPreviewGroup = L.layerGroup().addTo(map);
        var missionPreviewMarkers = [];
        var missionPreviewPolyline = null;
        var missionPreviewPolygon = null;
        var missionPreviewCoveragePolyline = null;
        const MISSION_PREVIEW_COLOR = '#FF9800';
        const MISSION_COVERAGE_LINE = '#42A5F5';
        const MISSION_DONE_COLOR = '#00E676';
        const MISSION_CURRENT_COLOR = '#00B0FF';
        const MISSION_COVERAGE_START = '#00E676';

        function clearMissionPreview() {
            missionPreviewMarkers.forEach(function (m) {
                missionPreviewGroup.removeLayer(m);
            });
            missionPreviewMarkers = [];
            if (missionPreviewPolyline) {
                missionPreviewGroup.removeLayer(missionPreviewPolyline);
                missionPreviewPolyline = null;
            }
            if (missionPreviewPolygon) {
                missionPreviewGroup.removeLayer(missionPreviewPolygon);
                missionPreviewPolygon = null;
            }
            if (missionPreviewCoveragePolyline) {
                missionPreviewGroup.removeLayer(missionPreviewCoveragePolyline);
                missionPreviewCoveragePolyline = null;
            }
        }

        function setMissionPreview(type, coords) {
            clearMissionPreview();
            if (!coords || coords.length === 0) return;
            const t = (type || 'PATH').toUpperCase();
            coords.forEach(function (c) {
                const lat = c[0], lng = c[1];
                const m = L.circleMarker([lat, lng], {
                    radius: 3,
                    color: MISSION_PREVIEW_COLOR,
                    weight: 1,
                    fillColor: MISSION_PREVIEW_COLOR,
                    fillOpacity: 0.85
                }).addTo(missionPreviewGroup);
                missionPreviewMarkers.push(m);
            });
            const ll = coords.map(function (c) { return L.latLng(c[0], c[1]); });
            if (t === 'POLY' && ll.length >= 3) {
                missionPreviewPolygon = L.polygon(ll, {
                    color: MISSION_PREVIEW_COLOR,
                    weight: 3,
                    fillColor: MISSION_PREVIEW_COLOR,
                    fillOpacity: 0.22
                }).addTo(missionPreviewGroup);
            } else if (ll.length >= 2) {
                missionPreviewPolyline = L.polyline(ll, {
                    color: MISSION_PREVIEW_COLOR,
                    weight: 3,
                    opacity: 0.95
                }).addTo(missionPreviewGroup);
            }
            try {
                const b = L.latLngBounds(ll);
                if (b.isValid()) {
                    map.fitBounds(b.pad(0.12));
                }
            } catch (e) { /* ignore */ }
        }

        /** POLY region fill + coverage path; progress markers follow path order. */
        function setPolyCoveragePreview(polyCoords, pathCoords) {
            clearMissionPreview();
            if (!polyCoords || polyCoords.length < 3) return;
            var pll = polyCoords.map(function (c) { return L.latLng(c[0], c[1]); });
            missionPreviewPolygon = L.polygon(pll, {
                color: MISSION_PREVIEW_COLOR,
                weight: 3,
                fillColor: MISSION_PREVIEW_COLOR,
                fillOpacity: 0.18
            }).addTo(missionPreviewGroup);
            if (pathCoords && pathCoords.length >= 2) {
                var pathLatLngs = pathCoords.map(function (c) { return L.latLng(c[0], c[1]); });
                missionPreviewCoveragePolyline = L.polyline(pathLatLngs, {
                    color: MISSION_COVERAGE_LINE,
                    weight: 3,
                    dashArray: '8 6',
                    opacity: 0.92
                }).addTo(missionPreviewGroup);
                pathCoords.forEach(function (c, i) {
                    var lat = c[0], lng = c[1];
                    var isStart = (i === 0);
                    var m = L.circleMarker([lat, lng], {
                        radius: isStart ? 4 : 3,
                        color: isStart ? MISSION_COVERAGE_START : MISSION_PREVIEW_COLOR,
                        weight: 1,
                        fillColor: isStart ? MISSION_COVERAGE_START : MISSION_PREVIEW_COLOR,
                        fillOpacity: 0.88
                    }).addTo(missionPreviewGroup);
                    missionPreviewMarkers.push(m);
                });
            }
            try {
                var all = pll.slice();
                if (pathCoords && pathCoords.length) {
                    pathCoords.forEach(function (c) {
                        all.push(L.latLng(c[0], c[1]));
                    });
                }
                var b = L.latLngBounds(all);
                if (b.isValid()) {
                    map.fitBounds(b.pad(0.12));
                }
            } catch (e) { /* ignore */ }
        }

        /** Reset markers to preview orange, or color by progress.
         *  lastNodeIndex < 0: all orange (no progress).
         *  missionDone: all green (mission finished).
         *  Otherwise: index < lastNodeIndex green; == lastNodeIndex current (larger blue); rest orange.
         */
        function updateMissionProgress(lastNodeIndex, missionDone) {
            missionDone = !!missionDone;
            if (!missionPreviewMarkers.length) return;
            if (missionDone) {
                missionPreviewMarkers.forEach(function (m) {
                    m.setStyle({
                        radius: 3,
                        color: MISSION_DONE_COLOR,
                        weight: 1,
                        fillColor: MISSION_DONE_COLOR,
                        fillOpacity: 0.9
                    });
                });
                return;
            }
            if (lastNodeIndex < 0) {
                missionPreviewMarkers.forEach(function (m) {
                    m.setStyle({
                        radius: 3,
                        color: MISSION_PREVIEW_COLOR,
                        weight: 1,
                        fillColor: MISSION_PREVIEW_COLOR,
                        fillOpacity: 0.85
                    });
                });
                return;
            }
            const n = missionPreviewMarkers.length;
            const cur = Math.max(0, Math.min(n - 1, lastNodeIndex | 0));
            missionPreviewMarkers.forEach(function (m, i) {
                if (i < cur) {
                    m.setStyle({
                        radius: 3,
                        color: MISSION_DONE_COLOR,
                        weight: 1,
                        fillColor: MISSION_DONE_COLOR,
                        fillOpacity: 0.9
                    });
                } else if (i === cur) {
                    m.setStyle({
                        radius: 5,
                        color: MISSION_CURRENT_COLOR,
                        weight: 1,
                        fillColor: MISSION_CURRENT_COLOR,
                        fillOpacity: 0.95
                    });
                } else {
                    m.setStyle({
                        radius: 3,
                        color: MISSION_PREVIEW_COLOR,
                        weight: 1,
                        fillColor: MISSION_PREVIEW_COLOR,
                        fillOpacity: 0.85
                    });
                }
            });
        }
    </script>
</body>
</html>
